<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ReportOS Offline</title>
    <style>
      :root {
        color-scheme: light;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Segoe UI", Tahoma, Geneva, Verdana, sans-serif;
        background: linear-gradient(160deg, #f1f5f9 0%, #e2e8f0 100%);
        color: #0f172a;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      .offline-card {
        width: min(640px, 100%);
        background: #ffffff;
        border: 1px solid #cbd5e1;
        border-radius: 16px;
        padding: 24px;
        box-shadow: 0 16px 34px rgba(15, 23, 42, 0.08);
      }

      h1 {
        margin: 0 0 8px;
        font-size: 1.7rem;
        line-height: 1.2;
      }

      p {
        margin: 0 0 16px;
        color: #334155;
      }

      ul {
        margin: 0;
        padding-left: 20px;
        color: #334155;
      }

      li + li {
        margin-top: 6px;
      }

      .actions {
        margin-top: 20px;
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .btn {
        border: 0;
        border-radius: 10px;
        padding: 10px 14px;
        cursor: pointer;
        font-weight: 600;
      }

      .btn-primary {
        background: #1d4ed8;
        color: #fff;
      }

      .btn-secondary {
        background: #e2e8f0;
        color: #0f172a;
      }
    </style>
  </head>
  <body>
    <main class="offline-card" role="main">
      <h1>Sem conexão no momento</h1>
      <p>O ReportOS está em modo offline. Esta rota ainda não estava em cache.</p>
      <ul>
        <li>Volte para uma tela já aberta anteriormente.</li>
        <li>Assim que a conexão retornar, as páginas principais serão sincronizadas.</li>
        <li>Você pode tentar novamente usando o botão abaixo.</li>
      </ul>
      <div class="actions">
        <button class="btn btn-primary" type="button" onclick="window.location.reload();">Tentar novamente</button>
        <button class="btn btn-secondary" type="button" onclick="window.history.back();">Voltar</button>
      </div>
    </main>
  </body>
</html>
